const parseDate=(s)=>{if(!s)return null;const d=new Date(s);d.setHours(0,0,0,0);return d;};
const daysLeft=(e)=>{const end=parseDate(e);if(!end)return null;return Math.ceil((end-today())/86400000);};
const formatDate=(s)=>{if(!s)return"—";const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;};
const addDays=(base,n)=>{const d=new Date(base);d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];};

// ── Sync Status Bar ────────────────────────────────────────────────────────
function SyncBar({status, lastSync, onSync, syncing}) {
  const cfg = {
    idle:    {bg:"#f0fdf4",border:"#86efac",color:"#166534",text:"Đã đồng bộ Google Sheets"},
    syncing: {bg:"#eff6ff",border:"#93c5fd",color:"#1e40af",text:"Đang đồng bộ..."},
    error:   {bg:"#fef2f2",border:"#fca5a5",color:"#991b1b",text:"Lỗi kết nối – dùng bộ nhớ cục bộ"},
    offline: {bg:"#fefce8",border:"#fde047",color:"#854d0e",text:"Chưa kết nối – đang dùng bộ nhớ cục bộ"},
  };
  const c = cfg[status] || cfg.idle;
  return html`
    <div style=${{display:"flex",alignItems:"center",gap:8,padding:"6px 16px",background:c.bg,borderBottom:`1px solid ${c.border}`,fontSize:12,color:c.color}}>
      ${status==="syncing" && html`<span class="spin" style=${{display:"inline-flex"}}><${IRefresh} size=${13} style=${{color:c.color}}/></span>`}
      ${status==="idle"    && html`<${ICloud}   size=${13} style=${{color:c.color}}/>`}
      ${status==="error"   && html`<${IWifi}    size=${13} style=${{color:c.color}}/>`}
      ${status==="offline" && html`<${IWifi}    size=${13} style=${{color:c.color}}/>`}
      <span style=${{fontWeight:600}}>${c.text}</span>
      ${lastSync && status==="idle" && html`<span style=${{opacity:.6}}>· ${lastSync}</span>`}
      <button onClick=${onSync} disabled=${syncing}
        style=${{marginLeft:"auto",padding:"3px 10px",border:"1px solid currentColor",borderRadius:6,background:"transparent",color:c.color,fontSize:11,fontWeight:700,cursor:syncing?"not-allowed":"pointer",opacity:syncing?.5:1}}>
        ${syncing?"Đang tải...":"Tải lại"}
      </button>
    </div>`;
}

// ── StatusBadge ────────────────────────────────────────────────────────────
function StatusBadge({endDate}){
  const dl=daysLeft(endDate),s=getStatus(endDate);
  const base={display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:9999,fontSize:11,fontWeight:700};
  if(s==="expired") return html`<span style=${{...base,background:"#f3f4f6",color:"#6b7280"}}><${IXCircle} size=${11}/> Đã kết thúc</span>`;
  if(s==="warning") return html`<span class="pulse" style=${{...base,background:"#ffedd5",color:"#c2410c"}}><${IWarn} size=${11}/> Còn ${dl} ngày</span>`;
  return html`<span style=${{...base,background:"#dcfce7",color:"#166534"}}><${ICheck} size=${11}/> Còn ${dl} ngày</span>`;
}

function Modal({title,onClose,children}){
  return html`
    <div style=${{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style=${{position:"absolute",inset:0,background:"rgba(0,0,0,.45)"}} onClick=${onClose}/>
      <div class="fadein" style=${{position:"relative",background:"white",borderRadius:16,boxShadow:"0 25px 50px rgba(0,0,0,.25)",width:"100%",maxWidth:640,maxHeight:"90vh",overflowY:"auto"}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 24px",borderBottom:"1px solid #f3f4f6",position:"sticky",top:0,background:"white",borderRadius:"16px 16px 0 0",zIndex:10}}>
          <h2 style=${{margin:0,fontSize:17,fontWeight:800,color:"#1f2937"}}>${title}</h2>
          <button onClick=${onClose} style=${{padding:6,border:"none",background:"none",cursor:"pointer",borderRadius:8,display:"flex"}}><${IX} size=${20} style=${{color:"#6b7280"}}/></button>
        </div>
        <div style=${{padding:24}}>${children}</div>
      </div>
    </div>`;
}

// ── LoginModal ─────────────────────────────────────────────────────────────
function LoginModal({onLogin,onClose,loggingIn}){
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState("");
  const inp={width:"100%",padding:"8px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"};
  const lbl={display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:4};
  const handleLogin=async()=>{
    if(!username.trim()||!password.trim()){setError("Vui lòng nhập đầy đủ thông tin");return;}
    const r=await onLogin(username.trim(),password.trim());
    if(r&&r.error) setError(r.error);
  };
  return html`
    <${Modal} title="🔐 Đăng nhập" onClose=${onClose}>
      <div style=${{display:"flex",flexDirection:"column",gap:16}}>
        <div>
          <label style=${lbl}>Tên đăng nhập</label>
          <input style=${inp} value=${username} placeholder="Nhập tên đăng nhập"
            onChange=${e=>{setUsername(e.target.value);setError("");}}
            onKeyDown=${e=>e.key==="Enter"&&handleLogin()}/>
        </div>
        <div>
          <label style=${lbl}>Mật khẩu</label>
          <input style=${inp} type="password" value=${password} placeholder="Nhập mật khẩu"
            onChange=${e=>{setPassword(e.target.value);setError("");}}
            onKeyDown=${e=>e.key==="Enter"&&handleLogin()}/>
        </div>
        ${error&&html`<p style=${{fontSize:12,color:"#ef4444",margin:0,background:"#fef2f2",padding:"8px 12px",borderRadius:8,border:"1px solid #fecaca"}}>${error}</p>`}
        <p style=${{fontSize:11,color:"#9ca3af",margin:0}}>Liên hệ quản trị viên nếu chưa có tài khoản.</p>
        <div style=${{display:"flex",gap:12,paddingTop:4,borderTop:"1px solid #f3f4f6"}}>
          <button onClick=${onClose} style=${{flex:1,padding:"9px 0",border:"1px solid #d1d5db",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",background:"white",color:"#374151"}}>Huỷ</button>
          <button onClick=${handleLogin} disabled=${loggingIn}
            style=${{flex:1,padding:"9px 0",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:loggingIn?"not-allowed":"pointer",background:loggingIn?"#93c5fd":"#1e3a8a",color:"white",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            ${loggingIn&&html`<span class="spin" style=${{display:"inline-flex"}}><${IRefresh} size=${14} style=${{color:"white"}}/></span>`}
            ${loggingIn?"Đang xác thực...":"Đăng nhập"}
          </button>
        </div>
      </div>
    <//>`;
}

// ── StudentForm ────────────────────────────────────────────────────────────
function StudentForm({student,doctors,onSave,onClose,saving}){
  const blank={id:"",name:"",birthYear:"",type:"BS Thực hành",unit:"",startDate:"",endDate:"",doctorOfficial:"",doctorActual:"",note:""};
  const [form,setForm]=useState(student?{...student}:blank);
  const [errors,setErrors]=useState({});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const validate=()=>{
    const e={};
    if(!form.name.trim()) e.name="Vui lòng nhập họ tên";
    if(!form.birthYear||isNaN(form.birthYear)||form.birthYear<1950||form.birthYear>2010) e.birthYear="Năm sinh không hợp lệ";
    if(!form.unit.trim()) e.unit="Vui lòng nhập đơn vị";
    if(!form.startDate) e.startDate="Chọn ngày bắt đầu";
    if(!form.endDate) e.endDate="Chọn ngày kết thúc";
    if(form.startDate&&form.endDate&&form.endDate<=form.startDate) e.endDate="Ngày kết thúc phải sau ngày bắt đầu";
    if(!form.doctorOfficial) e.doctorOfficial="Chọn BS giấy tờ";
    if(!form.doctorActual) e.doctorActual="Chọn BS thực tế";
    setErrors(e); return Object.keys(e).length===0;
  };
  const handleSave=()=>{ if(!validate()) return; onSave({...form,id:form.id||`s${Date.now()}`,birthYear:parseInt(form.birthYear)}); };
  const inp=(err)=>({width:"100%",padding:"8px 12px",borderRadius:8,border:`1px solid ${err?"#f87171":"#d1d5db"}`,fontSize:13,outline:"none",background:err?"#fef2f2":"white"});
  const lbl={display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:4};
  const Field=({label,required,error,children})=>html`
    <div>
      <label style=${lbl}>${label}${required&&html`<span style=${{color:"#ef4444",marginLeft:2}}>*</span>`}</label>
      ${children}
      ${error&&html`<p style=${{fontSize:11,color:"#ef4444",marginTop:3}}>${error}</p>`}
    </div>`;
  return html`
    <div style=${{display:"flex",flexDirection:"column",gap:16}}>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style=${{gridColumn:"1/-1"}}><${Field} label="Họ và tên" required error=${errors.name}><input style=${inp(errors.name)} value=${form.name} onChange=${e=>set("name",e.target.value)} placeholder="Nhập họ và tên đầy đủ"/><//>  </div>
        <${Field} label="Năm sinh" required error=${errors.birthYear}><input style=${inp(errors.birthYear)} type="number" value=${form.birthYear} onChange=${e=>set("birthYear",e.target.value)} placeholder="VD: 1995" min="1950" max="2010"/><//>
        <${Field} label="Đối tượng thực hành" required><select style=${inp(false)} value=${form.type} onChange=${e=>set("type",e.target.value)}>${TYPES.map(t=>html`<option key=${t} value=${t}>${t}</option>`)}</select><//>
        <div style=${{gridColumn:"1/-1"}}><${Field} label="Đơn vị quản lý" required error=${errors.unit}><input style=${inp(errors.unit)} value=${form.unit} onChange=${e=>set("unit",e.target.value)} placeholder="Tên bệnh viện / đơn vị công tác"/><//>  </div>
        <${Field} label="Ngày bắt đầu" required error=${errors.startDate}><input style=${inp(errors.startDate)} type="date" value=${form.startDate} onChange=${e=>set("startDate",e.target.value)}/><//>
        <${Field} label="Ngày kết thúc" required error=${errors.endDate}><input style=${inp(errors.endDate)} type="date" value=${form.endDate} onChange=${e=>set("endDate",e.target.value)}/><//>
        <${Field} label="BS hướng dẫn (giấy tờ)" required error=${errors.doctorOfficial}><select style=${inp(errors.doctorOfficial)} value=${form.doctorOfficial} onChange=${e=>set("doctorOfficial",e.target.value)}><option value="">-- Chọn bác sĩ --</option>${doctors.map(d=>html`<option key=${d.id} value=${d.id}>${d.name}</option>`)}</select><//>
        <${Field} label="BS hướng dẫn (thực tế)" required error=${errors.doctorActual}><select style=${inp(errors.doctorActual)} value=${form.doctorActual} onChange=${e=>set("doctorActual",e.target.value)}><option value="">-- Chọn bác sĩ --</option>${doctors.map(d=>html`<option key=${d.id} value=${d.id}>${d.name}</option>`)}</select><//>
        <div style=${{gridColumn:"1/-1"}}><${Field} label="Ghi chú"><textarea style=${{...inp(false),resize:"none"}} rows="2" value=${form.note} onChange=${e=>set("note",e.target.value)} placeholder="Ghi chú thêm (nếu có)..."/><//>  </div>
      </div>
      <div style=${{display:"flex",gap:12,paddingTop:12,borderTop:"1px solid #f3f4f6"}}>
        <button onClick=${onClose} style=${{flex:1,padding:"9px 0",border:"1px solid #d1d5db",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",background:"white",color:"#374151"}}>Huỷ</button>
        <button onClick=${handleSave} disabled=${saving} style=${{flex:1,padding:"9px 0",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:saving?"not-allowed":"pointer",background:saving?"#93c5fd":"#1e3a8a",color:"white",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          ${saving?html`<span class="spin" style=${{display:"inline-flex"}}><${IRefresh} size=${14} style=${{color:"white"}}/></span>`:html`<${ISave} size=${15} style=${{color:"white"}}/>`}
          ${saving?"Đang lưu lên Sheets...":"Lưu học viên"}
        </button>
      </div>
    </div>`;
}

// ── StatCard ───────────────────────────────────────────────────────────────
function StatCard({icon,label,value,sub,grad}){
  return html`
    <div style=${{background:grad,borderRadius:16,padding:20,boxShadow:"0 4px 12px rgba(0,0,0,.15)",color:"white"}}>
      <div style=${{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
        <div>
          <p style=${{margin:0,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",opacity:.75}}>${label}</p>
          <p style=${{margin:"4px 0 0",fontSize:36,fontWeight:900,lineHeight:1}}>${value}</p>
          ${sub&&html`<p style=${{margin:"4px 0 0",fontSize:11,opacity:.8}}>${sub}</p>`}
        </div>
        <div style=${{background:"rgba(255,255,255,.2)",borderRadius:12,padding:10,display:"flex"}}>${icon}</div>
      </div>
    </div>`;
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function Dashboard({students,doctors}){
  const active =students.filter(s=>getStatus(s.endDate)!=="expired");
  const warning=students.filter(s=>getStatus(s.endDate)==="warning");
  const expired=students.filter(s=>getStatus(s.endDate)==="expired");
  const cnt=t=>active.filter(s=>s.type===t).length;
  const dStats=doctors.map(d=>({...d,off:active.filter(s=>s.doctorOfficial===d.id).length,act:active.filter(s=>s.doctorActual===d.id).length}));
  return html`
    <div style=${{display:"flex",flexDirection:"column",gap:24}}>
      ${warning.length>0&&html`
        <div class="fadein" style=${{background:"linear-gradient(to right,#fff7ed,#fffbeb)",borderLeft:"4px solid #f97316",borderRadius:12,padding:16}}>
          <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <div style=${{background:"#f97316",borderRadius:8,padding:6,display:"flex"}}><${IBell} size=${16} style=${{color:"white"}}/></div>
            <h3 style=${{margin:0,fontWeight:800,color:"#9a3412"}}>⚠️ CẢNH BÁO — ${warning.length} học viên sắp hết hạn thực hành</h3>
          </div>
          <div style=${{display:"flex",flexDirection:"column",gap:8}}>
            ${warning.map(s=>html`
              <div key=${s.id} style=${{background:"white",borderRadius:10,padding:"10px 16px",border:"1px solid #fed7aa",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style=${{display:"flex",alignItems:"center",gap:12}}>
                  <${IWarn} size=${14} style=${{color:"#f97316",flexShrink:0}}/>
                  <div><p style=${{margin:0,fontWeight:700,fontSize:14,color:"#111827"}}>${s.name}</p><p style=${{margin:0,fontSize:11,color:"#6b7280"}}>${s.type} · ${s.unit}</p></div>
                </div>
                <div style=${{textAlign:"right"}}>
                  <p style=${{margin:0,fontWeight:800,fontSize:14,color:"#c2410c"}}>Còn ${daysLeft(s.endDate)} ngày</p>
                  <p style=${{margin:0,fontSize:11,color:"#6b7280"}}>Hết hạn: ${formatDate(s.endDate)}</p>
                </div>
              </div>`)}
          </div>
        </div>`}

      <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:16}}>
        <div style=${{gridColumn:"span 2"}}>
          <${StatCard} icon=${html`<${IUsers} size=${22} style=${{color:"white"}}/>`} label="Đang thực hành" value=${active.length} sub=${"Tổng cộng "+students.length+" học viên"} grad="linear-gradient(135deg,#1e3a8a,#2563eb)"/>
        </div>
        <${StatCard} icon=${html`<span style=${{fontSize:20}}>🩺</span>`} label="BS Thực hành"    value=${cnt("BS Thực hành")}    grad="linear-gradient(135deg,#059669,#14b8a6)"/>
        <${StatCard} icon=${html`<span style=${{fontSize:20}}>🏥</span>`} label="Nội trú"         value=${cnt("BS Nội trú")}       grad="linear-gradient(135deg,#7c3aed,#a855f7)"/>
        <${StatCard} icon=${html`<span style=${{fontSize:20}}>📋</span>`} label="CK1"             value=${cnt("BS CK1")}           grad="linear-gradient(135deg,#d97706,#f59e0b)"/>
        <${StatCard} icon=${html`<span style=${{fontSize:20}}>🎓</span>`} label="CK2"             value=${cnt("BS CK2")}           grad="linear-gradient(135deg,#ea580c,#fb923c)"/>
        <${StatCard} icon=${html`<span style=${{fontSize:20}}>🧠</span>`} label="BS Đột quỵ"     value=${cnt("BS Lớp Đột quỵ")}  grad="linear-gradient(135deg,#be185d,#ec4899)"/>
        <${StatCard} icon=${html`<span style=${{fontSize:20}}>💊</span>`} label="ĐD Đột quỵ"     value=${cnt("ĐD Lớp Đột quỵ")} grad="linear-gradient(135deg,#c2410c,#f97316)"/>
        <${StatCard} icon=${html`<span style=${{fontSize:20}}>👩‍⚕️</span>`} label="ĐD Thực hành" value=${cnt("ĐD Thực hành")}    grad="linear-gradient(135deg,#0f766e,#14b8a6)"/>
      </div>

      <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:24}}>
        <div style=${{background:"white",borderRadius:16,border:"1px solid #f3f4f6",boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}}>
          <div style=${{padding:"16px 20px",borderBottom:"1px solid #f3f4f6",display:"flex",alignItems:"center",gap:8}}>
            <${ISteth} size=${18} style=${{color:"#1e3a8a"}}/>
            <h3 style=${{margin:0,fontWeight:800,fontSize:15,color:"#111827"}}>Phụ trách học viên theo nhân sự khoa</h3>
          </div>
          <div style=${{padding:16,display:"flex",flexDirection:"column",gap:6}}>
            ${dStats.length===0&&html`<p style=${{textAlign:"center",color:"#9ca3af",fontSize:13,padding:"16px 0"}}>Chưa có bác sĩ</p>`}
            ${dStats.map(d=>html`
              <div key=${d.id} style=${{display:"flex",alignItems:"center",gap:12,padding:10,borderRadius:10}}>
                <div style=${{width:36,height:36,background:"#dbeafe",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style=${{color:"#1e3a8a",fontWeight:800,fontSize:13}}>${d.name.split(" ").pop()[0]}</span>
                </div>
                <div style=${{flex:1,minWidth:0}}><p style=${{margin:0,fontWeight:700,fontSize:13,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${d.name}</p></div>
                <div style=${{display:"flex",gap:16,textAlign:"center",flexShrink:0}}>
                  <div><p style=${{margin:0,fontSize:10,color:"#9ca3af"}}>Giấy tờ</p><p style=${{margin:0,fontWeight:900,fontSize:20,color:"#1e3a8a"}}>${d.off}</p></div>
                  <div style=${{width:1,background:"#e5e7eb"}}/>
                  <div><p style=${{margin:0,fontSize:10,color:"#9ca3af"}}>Thực tế</p><p style=${{margin:0,fontWeight:900,fontSize:20,color:"#059669"}}>${d.act}</p></div>
                </div>
              </div>`)}
          </div>
        </div>

        <div style=${{background:"white",borderRadius:16,border:"1px solid #f3f4f6",boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}}>
          <div style=${{padding:"16px 20px",borderBottom:"1px solid #f3f4f6",display:"flex",alignItems:"center",gap:8}}>
            <${IXCircle} size=${18} style=${{color:"#9ca3af"}}/>
            <h3 style=${{margin:0,fontWeight:800,fontSize:15,color:"#111827"}}>Đã kết thúc thực hành</h3>
            <span style=${{marginLeft:"auto",background:"#f3f4f6",color:"#6b7280",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:9999}}>${expired.length}</span>
          </div>
          <div style=${{padding:16,display:"flex",flexDirection:"column",gap:6,maxHeight:280,overflowY:"auto"}}>
            ${expired.length===0&&html`<p style=${{textAlign:"center",color:"#9ca3af",fontSize:13,padding:"16px 0"}}>Không có học viên đã kết thúc</p>`}
            ${expired.map(s=>html`
              <div key=${s.id} style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:10,borderRadius:10,background:"#f9fafb",opacity:.7}}>
                <div><p style=${{margin:0,fontWeight:600,fontSize:13,color:"#4b5563"}}>${s.name}</p><p style=${{margin:0,fontSize:11,color:"#9ca3af"}}>${s.type} · ${s.unit}</p></div>
                <div style=${{textAlign:"right"}}><p style=${{margin:0,fontSize:11,color:"#9ca3af"}}>Kết thúc</p><p style=${{margin:0,fontSize:11,fontWeight:700,color:"#6b7280"}}>${formatDate(s.endDate)}</p></div>
              </div>`)}
          </div>
        </div>
      </div>
    </div>`;
}

// ── StudentList ────────────────────────────────────────────────────────────
function StudentList({students,doctors,onAdd,onEdit,onDelete,isLoggedIn}){
  const [search,setSearch]=useState("");
  const [fType,setFType]=useState("all");
  const [fStatus,setFStatus]=useState("all");
  const [fDoctor,setFDoctor]=useState("all");
  const dName=id=>doctors.find(d=>d.id===id)?.name||"—";
  const filtered=useMemo(()=>students.filter(s=>{
    if(search&&!s.name.toLowerCase().includes(search.toLowerCase())&&!s.unit.toLowerCase().includes(search.toLowerCase())) return false;
    if(fType!=="all"&&s.type!==fType) return false;
    if(fStatus!=="all"&&getStatus(s.endDate)!==fStatus) return false;
    if(fDoctor!=="all"&&s.doctorOfficial!==fDoctor&&s.doctorActual!==fDoctor) return false;
    return true;
  }),[students,search,fType,fStatus,fDoctor]);
  const sel={padding:"8px 12px",border:"1px solid #e5e7eb",borderRadius:8,fontSize:13,background:"white",outline:"none"};
  const th={padding:"12px 16px",textAlign:"left",fontSize:11,fontWeight:800,color:"#6b7280",textTransform:"uppercase",letterSpacing:".05em",whiteSpace:"nowrap",background:"#f9fafb",borderBottom:"1px solid #f3f4f6"};
  const td={padding:"12px 16px",fontSize:13,verticalAlign:"middle"};
  return html`
    <div style=${{display:"flex",flexDirection:"column",gap:16}}>
      <div style=${{display:"flex",flexWrap:"wrap",gap:12}}>
        <div style=${{position:"relative",flex:"1 1 200px"}}>
          <${ISearch} size=${15} style=${{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#9ca3af"}}/>
          <input style=${{width:"100%",padding:"8px 12px 8px 36px",border:"1px solid #e5e7eb",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"}} placeholder="Tìm kiếm theo tên, đơn vị..." value=${search} onChange=${e=>setSearch(e.target.value)}/>
        </div>
        <select style=${sel} value=${fType} onChange=${e=>setFType(e.target.value)}><option value="all">Tất cả đối tượng</option>${TYPES.map(t=>html`<option key=${t} value=${t}>${t}</option>`)}</select>
        <select style=${sel} value=${fStatus} onChange=${e=>setFStatus(e.target.value)}><option value="all">Tất cả trạng thái</option><option value="active">Đang thực hành</option><option value="warning">Sắp hết hạn</option><option value="expired">Đã kết thúc</option></select>
        <select style=${sel} value=${fDoctor} onChange=${e=>setFDoctor(e.target.value)}><option value="all">Tất cả bác sĩ</option>${doctors.map(d=>html`<option key=${d.id} value=${d.id}>${d.name}</option>`)}</select>
        ${isLoggedIn&&html`<button onClick=${onAdd} style=${{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",border:"none",borderRadius:8,background:"#1e3a8a",color:"white",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
          <${IPlus} size=${15} style=${{color:"white"}}/> Thêm học viên
        </button>`}
        ${!isLoggedIn&&html`<div style=${{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",border:"1px dashed #d1d5db",borderRadius:8,fontSize:12,color:"#9ca3af"}}><${ILock} size=${13}/> Đăng nhập để chỉnh sửa</div>`}
      </div>
      <p style=${{fontSize:13,color:"#6b7280",margin:0}}>Hiển thị ${filtered.length} / ${students.length} học viên</p>
      <div style=${{background:"white",borderRadius:16,border:"1px solid #f3f4f6",boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}}>
        <div style=${{overflowX:"auto"}}>
          <table style=${{width:"100%",borderCollapse:"collapse",minWidth:900}}>
            <thead><tr>${["Họ và tên","Năm sinh","Đối tượng","Đơn vị","Thời gian TH","Trạng thái","BS Giấy tờ","BS Thực tế","Thao tác"].map(h2=>html`<th key=${h2} style=${th}>${h2}</th>`)}</tr></thead>
            <tbody>
              ${filtered.length===0&&html`<tr><td colspan="9" style=${{textAlign:"center",padding:48,color:"#9ca3af"}}><div style=${{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}><${IUsers} size=${32} style=${{opacity:.3,color:"#9ca3af"}}/><span>Không có học viên nào</span></div></td></tr>`}
              ${filtered.map((s,i)=>{
                const status=getStatus(s.endDate);
                const rowBg=status==="expired"?"rgba(249,250,251,.6)":status==="warning"?"rgba(255,247,237,.5)":i%2===0?"white":"rgba(249,250,251,.4)";
                const b=TYPE_BADGE[s.type]||{};
                return html`
                  <tr key=${s.id} style=${{background:rowBg,borderBottom:"1px solid #f9fafb",opacity:status==="expired"?.65:1}}>
                    <td style=${td}><p style=${{margin:0,fontWeight:700,color:"#111827"}}>${s.name}</p>${s.note&&html`<p style=${{margin:0,fontSize:11,color:"#9ca3af",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${s.note}</p>`}</td>
                    <td style=${{...td,color:"#4b5563"}}>${s.birthYear}</td>
                    <td style=${td}><span style=${{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:9999,fontSize:11,fontWeight:700,background:b.bg,color:b.color}}>${TYPE_ICONS[s.type]} ${s.type}</span></td>
                    <td style=${{...td,color:"#4b5563",maxWidth:120}}><div style=${{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${s.unit}</div></td>
                    <td style=${{...td,fontSize:11,color:"#6b7280",whiteSpace:"nowrap"}}><div>${formatDate(s.startDate)}</div><div style=${{color:"#9ca3af"}}>→ ${formatDate(s.endDate)}</div></td>
                    <td style=${td}><${StatusBadge} endDate=${s.endDate}/></td>
                    <td style=${{...td,fontSize:12,color:"#4b5563",maxWidth:120}}><div style=${{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${dName(s.doctorOfficial)}</div></td>
                    <td style=${{...td,fontSize:12,maxWidth:120}}><div style=${{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:s.doctorOfficial!==s.doctorActual?"#ea580c":"#4b5563",fontWeight:s.doctorOfficial!==s.doctorActual?700:400}}>${dName(s.doctorActual)}${s.doctorOfficial!==s.doctorActual?" ⚠️":""}</div></td>
                    <td style=${td}><div style=${{display:"flex",gap:4}}>
                      ${isLoggedIn&&html`<button onClick=${()=>onEdit(s)} style=${{padding:6,border:"none",background:"none",cursor:"pointer",color:"#2563eb",borderRadius:6}}><${IEdit} size=${14}/></button>`}
                      ${isLoggedIn&&html`<button onClick=${()=>onDelete(s.id)} style=${{padding:6,border:"none",background:"none",cursor:"pointer",color:"#ef4444",borderRadius:6}}><${ITrash} size=${14}/></button>`}
                      ${!isLoggedIn&&html`<${ILock} size=${13} style=${{color:"#d1d5db",margin:"0 6px"}}/>`}
                    </div></td>
                  </tr>`;
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

// ── DoctorsPage ────────────────────────────────────────────────────────────
function DoctorsPage({doctors,students,onAdd,onDelete,saving,isLoggedIn}){
  const [newName,setNewName]=useState("");const [err,setErr]=useState("");
  const active=students.filter(s=>getStatus(s.endDate)!=="expired");
  const handleAdd=()=>{
    if(!newName.trim()){setErr("Vui lòng nhập tên bác sĩ");return;}
    if(doctors.some(d=>d.name.toLowerCase()===newName.trim().toLowerCase())){setErr("Bác sĩ này đã tồn tại");return;}
    onAdd(newName.trim());setNewName("");setErr("");
  };
  return html`
    <div style=${{display:"flex",flexDirection:"column",gap:24}}>
      ${isLoggedIn&&html`<div style=${{background:"white",borderRadius:16,border:"1px solid #f3f4f6",boxShadow:"0 1px 4px rgba(0,0,0,.06)",padding:20}}>
        <h3 style=${{margin:"0 0 12px",fontWeight:800,fontSize:15,color:"#111827",display:"flex",alignItems:"center",gap:6}}><${IPlus} size=${16} style=${{color:"#1e3a8a"}}/>Thêm nhân viên mới</h3>
        <div style=${{display:"flex",gap:12}}>
          <div style=${{flex:1}}>
            <input style=${{width:"100%",padding:"8px 12px",border:("1px solid "+(err?"#f87171":"#d1d5db")),borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"}}
              placeholder="VD: BS Nguyễn Văn Hùng" value=${newName}
              onChange=${e=>{setNewName(e.target.value);setErr("");}}
              onKeyDown=${e=>e.key==="Enter"&&handleAdd()}/>
            ${err&&html`<p style=${{fontSize:11,color:"#ef4444",margin:"3px 0 0"}}>${err}</p>`}
          </div>
          <button onClick=${handleAdd} disabled=${saving} style=${{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",border:"none",borderRadius:8,background:saving?"#93c5fd":"#1e3a8a",color:"white",fontSize:13,fontWeight:700,cursor:saving?"not-allowed":"pointer",whiteSpace:"nowrap"}}>
            ${saving?html`<span class="spin" style=${{display:"inline-flex"}}><${IRefresh} size=${13} style=${{color:"white"}}/></span>`:html`<${IPlus} size=${14} style=${{color:"white"}}/>`}
            ${saving?"Đang lưu...":"Thêm"}
          </button>
        </div>
      </div>`}
      ${!isLoggedIn&&html`<div style=${{background:"white",borderRadius:16,border:"1px dashed #d1d5db",padding:"14px 20px",display:"flex",alignItems:"center",gap:8,color:"#9ca3af",fontSize:13}}><${ILock} size=${15}/>Đăng nhập để thêm hoặc xoá bác sĩ</div>`}
      <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
        ${doctors.map(d=>{
          const oc=active.filter(s=>s.doctorOfficial===d.id).length;
          const ac=active.filter(s=>s.doctorActual===d.id).length;
          const as2=active.filter(s=>s.doctorActual===d.id);
          return html`

// ── Statistics ─────────────────────────────────────────────────────────────
const wasActive   =(s,ps,pe)=>{const sd=parseDate(s.startDate),ed=parseDate(s.endDate);if(!sd||!ed)return false;return sd<=pe&&ed>=ps;};
const wasStarted  =(s,ps,pe)=>{const sd=parseDate(s.startDate);return sd&&sd>=ps&&sd<=pe;};
const wasCompleted=(s,ps,pe)=>{const ed=parseDate(s.endDate);return ed&&ed>=ps&&ed<=pe&&ed<today();};
const CTip=({active,payload,label})=>{
  if(!active||!payload?.length)return null;
  return h("div",{style:{background:"white",border:"1px solid #f3f4f6",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,.1)",padding:"10px 14px",fontSize:12}},
    h("p",{style:{margin:"0 0 8px",fontWeight:700,color:"#374151",paddingBottom:6,borderBottom:"1px solid #f3f4f6"}},label),
    payload.map((p,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",gap:16,marginTop:6}},
      h("span",{style:{display:"flex",alignItems:"center",gap:6}},h("span",{style:{width:10,height:10,borderRadius:"50%",background:p.color,display:"inline-block"}}),h("span",{style:{color:"#6b7280"}},p.name)),
      h("span",{style:{fontWeight:900,color:"#111827"}},p.value))));
};
const PTip=({active,payload})=>{
  if(!active||!payload?.length)return null;const p=payload[0];
  return h("div",{style:{background:"white",border:"1px solid #f3f4f6",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,.1)",padding:"8px 12px",fontSize:12}},
    h("p",{style:{margin:"0 0 2px",fontWeight:700,color:p.payload.fill}},p.name),
    h("p",{style:{margin:0,color:"#6b7280"}},`${p.value} học viên · ${p.payload.pct}%`));
};

    const row={label,active:0,newStudents:0,completed:0};
    TYPES.forEach(t=>{row[t]=0;});
    students.forEach(s=>{
      if(wasActive(s,ps,pe)){row.active++;row[s.type]=(row[s.type]||0)+1;}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [students,    setStudents]    = useState([]);
  const [doctors,     setDoctors]     = useState([]);
  const [page,        setPage]        = useState("dashboard");
  const [modal,       setModal]       = useState(null);
  const [deleteId,    setDeleteId]    = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [syncing,     setSyncing]     = useState(false);
  const [saving,      setSaving]      = useState(false);
  const [syncStatus,  setSyncStatus]  = useState("offline");
  const [lastSync,    setLastSync]    = useState(null);
  const [loading,     setLoading]     = useState(true);
  const [currentUser, setCurrentUser] = useState(null);
  const [authToken,   setAuthToken]   = useState(null);
  const [showLogin,   setShowLogin]   = useState(false);
  const [loggingIn,   setLoggingIn]   = useState(false);

  // ── Load data từ Google Sheets khi khởi động ─────────────────────────────
  const loadFromSheets = async (isManual=false) => {
    if(isManual) setSyncing(true);
    setSyncStatus("syncing");
    try {
      const data = await api.getAll();
      if(data.error) throw new Error(data.error);

      let stu = data.students || [];
      let doc = data.doctors  || [];

      // Nếu Sheets trống → ưu tiên localStorage, không overwrite dữ liệu cục bộ
      if(stu.length===0 && doc.length===0){
        const localStu = loadLS(LS_S, null);
        const localDoc = loadLS(LS_D, null);
        stu = (localStu && localStu.length > 0) ? localStu : SEED_STUDENTS;
        doc = (localDoc && localDoc.length > 0) ? localDoc : SEED_DOCTORS;
      } else {
        // Chỉ cập nhật localStorage khi Sheets có dữ liệu thực sự
        saveLS(LS_S, stu);
        saveLS(LS_D, doc);
      }

      setStudents(stu);
      setDoctors(doc);
      setSyncStatus("idle");
      setLastSync(new Date().toLocaleTimeString("vi-VN"));
    } catch(e){
      console.warn("Sheets error:", e);
      setStudents(loadLS(LS_S, SEED_STUDENTS));
      setDoctors(loadLS(LS_D, SEED_DOCTORS));
      setSyncStatus("error");
    } finally {
      setSyncing(false);
      setLoading(false);
    }
  };

  useEffect(()=>{
    // Khôi phục phiên đăng nhập từ localStorage
    const session = loadLS(LS_SESSION, null);
    if(session && session.expiry > Date.now()){
      setCurrentUser(session.username);
      setAuthToken(session.token);
    }
    loadFromSheets();
  },[]);

  // ── Sync helpers ──────────────────────────────────────────────────────────
  const syncStudents = async (newList) => {
    setStudents(newList);
    saveLS(LS_S, newList);
    try { await api.saveStudents(newList, authToken); setSyncStatus("idle"); setLastSync(new Date().toLocaleTimeString("vi-VN")); }
    catch(e){ setSyncStatus("error"); }
  };
  const syncDoctors = async (newList) => {
    setDoctors(newList);
    saveLS(LS_D, newList);
    try { await api.saveDoctors(newList, authToken); setSyncStatus("idle"); setLastSync(new Date().toLocaleTimeString("vi-VN")); }
    catch(e){ setSyncStatus("error"); }
  };

  // ── CRUD ──────────────────────────────────────────────────────────────────
  const saveStudent = async (s) => {
    setSaving(true);
    const newList = s.id && students.find(x=>x.id===s.id)
      ? students.map(x=>x.id===s.id?s:x)
      : [...students, s];
    await syncStudents(newList);
    setSaving(false);
    setModal(null);
  };
  const deleteStudent = async (id) => {
    const newList = students.filter(s=>s.id!==id);
    await syncStudents(newList);
    setDeleteId(null);
  };
  const addDoctor = async (name) => {
    setSaving(true);
    const newList = [...doctors, {id:`d${Date.now()}`, name}];
    await syncDoctors(newList);
    setSaving(false);
  };
  const deleteDoctor = async (id) => {
    if(students.some(s=>s.doctorOfficial===id||s.doctorActual===id)){
      alert("Không thể xoá: Bác sĩ này đang có học viên được phân công.");return;
    }
    const newList = doctors.filter(d=>d.id!==id);
    await syncDoctors(newList);
  };

  // ── Auth ─────────────────────────────────────────────────────────────────
  const handleLogin = async (username, password) => {
    setLoggingIn(true);
    try {
      const r = await api.login(username, password);
      if(r.error){ setLoggingIn(false); return r; }
      setCurrentUser(r.username);
      setAuthToken(r.token);
      saveLS(LS_SESSION, { username: r.username, token: r.token, expiry: r.expiry });
      setShowLogin(false);
    } catch(e){ setLoggingIn(false); return { error: "Lỗi kết nối. Vui lòng thử lại." }; }
    setLoggingIn(false);
    return { ok: true };
  };
  const handleLogout = async () => {
    if(authToken) api.logout(authToken).catch(()=>{});
    setCurrentUser(null);
    setAuthToken(null);
    saveLS(LS_SESSION, null);
  };

  const warnCount  = students.filter(s=>getStatus(s.endDate)==="warning").length;
  const activeCount= students.filter(s=>getStatus(s.endDate)!=="expired").length;
  const titles={dashboard:"Tổng quan",students:"Quản lý học viên",doctors:"Nhân sự khoa",stats:"Thống kê biểu đồ"};

  const navItems=[
    {id:"dashboard",label:"Tổng quan",  icon:html`<${IDash}    size=${18}/>`},
    {id:"students", label:"Học viên",   icon:html`<${IUsers}   size=${18}/>`,badge:activeCount},
    {id:"doctors",  label:"Nhân sự khoa",icon:html`<${ISteth}   size=${18}/>`},
    {id:"stats",    label:"Thống kê",   icon:html`<${IBar}     size=${18}/>`},
  ];

  const navBtn=(item)=>html`
    <button key=${item.id} onClick=${()=>{setPage(item.id);setSidebarOpen(false);}}
      style=${{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderRadius:12,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,marginBottom:4,transition:"all .15s",background:page===item.id?"white":"transparent",color:page===item.id?"#1e3a8a":"rgba(255,255,255,.85)"}}>
      ${item.icon}
      <span style=${{flex:1,textAlign:"left"}}>${item.label}</span>
      ${item.badge!==undefined&&html`<span style=${{fontSize:11,fontWeight:800,padding:"2px 7px",borderRadius:9999,background:page===item.id?"#dbeafe":"rgba(255,255,255,.2)",color:page===item.id?"#1e3a8a":"white"}}>${item.badge}</span>`}
      ${item.id==="students"&&warnCount>0&&html`<span class="pulse" style=${{fontSize:10,fontWeight:900,padding:"1px 6px",borderRadius:9999,background:"#f97316",color:"white"}}>${warnCount}</span>`}
    </button>`;

  if(loading) return html`
    <div style=${{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#f9fafb",gap:16}}>
      <div style=${{width:64,height:64,background:"linear-gradient(135deg,#1e3a8a,#2563eb)",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 8px 24px rgba(30,58,138,.3)"}}>
        <${IActivity} size=${32} style=${{color:"white"}}/>
      </div>
      <div style=${{textAlign:"center"}}>
        <p style=${{margin:0,fontWeight:800,fontSize:18,color:"#1e3a8a"}}>KHOA BỆNH LÝ MẠCH MÁU NÃO</p>
        <p style=${{margin:"4px 0 0",fontSize:13,color:"#6b7280"}}>Đang kết nối Google Sheets...</p>
      </div>
      <div class="spin" style=${{display:"flex"}}><${IRefresh} size=${24} style=${{color:"#2563eb"}}/></div>
    </div>`;

  return html`
    <div style=${{minHeight:"100vh",display:"flex",background:"#f9fafb",fontFamily:"ui-sans-serif,system-ui,sans-serif"}}>

      ${sidebarOpen&&html`<div style=${{position:"fixed",inset:0,zIndex:30,background:"rgba(0,0,0,.4)"}} onClick=${()=>setSidebarOpen(false)}/>`}

      <aside id="sidebar" style=${{width:256,minWidth:256,background:"linear-gradient(180deg,#1e3a8a 0%,#1d4ed8 100%)",display:"flex",flexDirection:"column",position:"fixed",top:0,bottom:0,left:0,zIndex:40,transform:sidebarOpen?"translateX(0)":"translateX(-256px)",transition:"transform .2s ease"}}>
        <div style=${{padding:"20px",borderBottom:"1px solid rgba(255,255,255,.1)"}}>
          <div style=${{display:"flex",alignItems:"center",gap:12}}>
            <div style=${{background:"rgba(255,255,255,.15)",borderRadius:10,padding:8,display:"flex"}}><${IActivity} size=${22} style=${{color:"white"}}/></div>
            <div><p style=${{margin:0,color:"white",fontWeight:900,fontSize:13,lineHeight:1.2}}>KHOA BỆNH LÝ</p><p style=${{margin:0,color:"rgba(255,255,255,.7)",fontSize:11,lineHeight:1.2}}>MẠCH MÁU NÃO</p></div>
          </div>
          <p style=${{margin:"8px 0 0",color:"rgba(255,255,255,.6)",fontSize:11}}>Quản lý học viên thực hành</p>
        </div>
        <nav style=${{flex:1,padding:"12px"}}>
          ${navItems.map(navBtn)}
        </nav>
        <div style=${{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,.1)"}}>
          <div style=${{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
            <${ICloud} size=${12} style=${{color:"rgba(255,255,255,.5)"}}/>
            <span style=${{fontSize:10,color:"rgba(255,255,255,.5)"}}>Google Sheets</span>
            <span style=${{marginLeft:"auto",width:7,height:7,borderRadius:"50%",background:syncStatus==="idle"?"#4ade80":syncStatus==="syncing"?"#fbbf24":"#f87171",display:"inline-block"}}/>
          </div>
          <p style=${{margin:0,color:"rgba(255,255,255,.4)",fontSize:10,textAlign:"center"}}>
            ${new Date().toLocaleDateString("vi-VN",{weekday:"short",year:"numeric",month:"short",day:"numeric"})}
          </p>
        </div>
      </aside>

      <div id="main-content" style=${{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        <style>
          @media(min-width:1024px){
            #sidebar{transform:translateX(0)!important;position:sticky!important;height:100vh;top:0;flex-shrink:0;}
          }
        </style>

        <${SyncBar} status=${syncStatus} lastSync=${lastSync} onSync=${()=>loadFromSheets(true)} syncing=${syncing}/>

        <header style=${{background:"white",borderBottom:"1px solid #f3f4f6",padding:"14px 24px",display:"flex",alignItems:"center",gap:16,position:"sticky",top:0,zIndex:20,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <button id="menu-btn" onClick=${()=>setSidebarOpen(true)} style=${{padding:8,border:"none",background:"none",cursor:"pointer",borderRadius:8,display:"flex"}}><${IMenu} size=${20} style=${{color:"#4b5563"}}/></button>
          <style>@media(min-width:1024px){#menu-btn{display:none!important}}</style>
          <div style=${{flex:1,minWidth:0}}>
            <h1 id="hdr-full" style=${{margin:0,fontSize:12,fontWeight:900,color:"#1e3a8a",textTransform:"uppercase",letterSpacing:".05em",display:"none"}}>Khoa Bệnh lý Mạch máu não — Quản lý học viên thực hành</h1>
            <style>@media(min-width:640px){#hdr-full{display:block!important}}</style>
            <p style=${{margin:0,fontSize:12,color:"#6b7280"}}>${titles[page]}</p>
          </div>
          <div style=${{display:"flex",alignItems:"center",gap:10}}>
            ${warnCount>0&&html`<button onClick=${()=>setPage("dashboard")} class="bounce" style=${{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",border:"none",borderRadius:8,background:"#fff7ed",color:"#c2410c",fontSize:12,fontWeight:700,cursor:"pointer"}}><${IBell} size=${13}/> ${warnCount} cảnh báo</button>`}
            <div style=${{background:"#eff6ff",padding:"6px 12px",borderRadius:8}}>
              <span style=${{color:"#1e3a8a",fontWeight:800,fontSize:14}}>${activeCount}</span>
              <span style=${{color:"#93c5fd",fontSize:11,marginLeft:4}}>học viên</span>
            </div>
            ${currentUser
              ? html`<div style=${{display:"flex",alignItems:"center",gap:8,background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"5px 12px"}}>
                  <span style=${{fontSize:12,fontWeight:700,color:"#166534"}}>${currentUser}</span>
                  <button onClick=${handleLogout} title="Đăng xuất" style=${{padding:4,border:"none",background:"none",cursor:"pointer",display:"flex",borderRadius:6,color:"#16a34a"}}><${ILogout} size=${14}/></button>
                </div>`
              : html`<button onClick=${()=>setShowLogin(true)} style=${{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",border:"1px solid #d1d5db",borderRadius:8,background:"white",fontSize:12,fontWeight:700,cursor:"pointer",color:"#374151"}}><${ILock} size=${13}/> Đăng nhập</button>`}
          </div>
        </header>

        <main style=${{flex:1,padding:24,overflowY:"auto"}}>
          ${page==="dashboard"&&html`<${Dashboard}     students=${students} doctors=${doctors}/>`}
          ${page==="students" &&html`<${StudentList}   students=${students} doctors=${doctors} onAdd=${()=>setModal({mode:"add"})} onEdit=${s=>setModal({mode:"edit",student:s})} onDelete=${id=>setDeleteId(id)} isLoggedIn=${!!currentUser}/>`}
          ${page==="doctors"  &&html`<${DoctorsPage}   doctors=${doctors} students=${students} onAdd=${addDoctor} onDelete=${deleteDoctor} saving=${saving} isLoggedIn=${!!currentUser}/>`}
          ${page==="stats"    &&html`<${StatisticsPage} students=${students}/>`}
        </main>
      </div>

      ${showLogin&&html`<${LoginModal} onLogin=${handleLogin} onClose=${()=>setShowLogin(false)} loggingIn=${loggingIn}/>`}

      ${modal&&html`
        <${Modal} title=${modal.mode==="add"?"➕ Thêm học viên mới":"✏️ Chỉnh sửa học viên"} onClose=${()=>!saving&&setModal(null)}>
          <${StudentForm} student=${modal.student} doctors=${doctors} onSave=${saveStudent} onClose=${()=>setModal(null)} saving=${saving}/>
        <//>`}

      ${deleteId&&html`
        <div style=${{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style=${{position:"absolute",inset:0,background:"rgba(0,0,0,.45)"}} onClick=${()=>setDeleteId(null)}/>
          <div class="fadein" style=${{position:"relative",background:"white",borderRadius:16,boxShadow:"0 25px 50px rgba(0,0,0,.25)",padding:24,width:"100%",maxWidth:360,textAlign:"center"}}>
            <div style=${{width:56,height:56,background:"#fee2e2",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><${ITrash} size=${24} style=${{color:"#ef4444"}}/></div>
            <h3 style=${{margin:"0 0 8px",fontSize:17,fontWeight:800,color:"#111827"}}>Xác nhận xoá</h3>
            <p style=${{margin:"0 0 24px",fontSize:13,color:"#6b7280"}}>Học viên sẽ bị xoá khỏi ứng dụng và Google Sheets. Không thể hoàn tác.</p>
            <div style=${{display:"flex",gap:12}}>
              <button onClick=${()=>setDeleteId(null)} style=${{flex:1,padding:"10px 0",border:"1px solid #d1d5db",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",background:"white",color:"#374151"}}>Huỷ</button>
              <button onClick=${()=>deleteStudent(deleteId)} style=${{flex:1,padding:"10px 0",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",background:"#ef4444",color:"white"}}>Xác nhận xoá</button>
            </div>
          </div>
        </div>`}
    </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
