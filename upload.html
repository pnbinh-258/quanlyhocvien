<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tải ảnh học viên – Khoa Bệnh lý Mạch máu não</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:#f9fafb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-flex}
</style>
</head>
<body>
<div id="root"></div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycby1zxLmsXqEnYvMXSszLTeRcXB5bszYmXXen82QtXWaGDpzQ1PvY0KZS7NAnjUok1uySA/exec";

function resizeImageFile(file, maxDim, quality){
  maxDim = maxDim || 800; quality = quality || 0.82;
  return new Promise(function(resolve, reject){
    const reader = new FileReader();
    reader.onerror = function(){ reject(new Error("Không đọc được file ảnh")); };
    reader.onload = function(){
      const img = new Image();
      img.onerror = function(){ reject(new Error("File không phải ảnh hợp lệ")); };
      img.onload = function(){
        let w = img.width, h = img.height;
        if(w>maxDim||h>maxDim){
          if(w>h){ h=Math.round(h*maxDim/w); w=maxDim; } else { w=Math.round(w*maxDim/h); h=maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadPendingPhoto(studentName, imageBase64, mimeType){
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "uploadPendingPhoto", payload: { studentName, imageBase64, mimeType } }),
  });
  return res.json();
}

const root = document.getElementById("root");

function render(html){ root.innerHTML = html; }

function card(inner){
  return '<div style="background:white;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:28px 24px;max-width:400px;width:100%;">' + inner + '</div>';
}

function renderForm(errorMsg){
  render(card(
    '<div style="text-align:center;margin-bottom:20px;">' +
      '<div style="width:56px;height:56px;background:linear-gradient(135deg,#1e3a8a,#2563eb);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:26px;">📷</div>' +
      '<h1 style="margin:0;font-size:16px;font-weight:900;color:#1e3a8a;">KHOA BỆNH LÝ MẠCH MÁU NÃO</h1>' +
      '<p style="margin:4px 0 0;font-size:12px;color:#6b7280;">Tải ảnh học viên thực hành</p>' +
    '</div>' +
    (errorMsg ? '<p style="background:#fef2f2;color:#dc2626;font-size:12px;padding:8px 12px;border-radius:8px;margin:0 0 12px;">' + errorMsg + '</p>' : '') +
    '<label style="display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:6px;">Họ và tên <span style="color:#ef4444;">*</span></label>' +
    '<input id="nameInput" type="text" placeholder="Nhập họ và tên đầy đủ" style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none;margin-bottom:16px;box-sizing:border-box;"/>' +
    '<label style="display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:6px;">Ảnh chân dung <span style="color:#ef4444;">*</span></label>' +
    '<div id="preview" style="width:100%;aspect-ratio:1;max-height:220px;border:2px dashed #d1d5db;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:12px;margin-bottom:16px;overflow:hidden;cursor:pointer;background:#f9fafb;">Chạm để chọn ảnh</div>' +
    '<input id="fileInput" type="file" accept="image/*" capture="environment" style="display:none;"/>' +
    '<button id="submitBtn" style="width:100%;padding:12px 0;border:none;border-radius:10px;background:#1e3a8a;color:white;font-size:14px;font-weight:700;cursor:pointer;">Tải ảnh lên</button>' +
    '<p style="margin:14px 0 0;font-size:11px;color:#9ca3af;text-align:center;">Ảnh sẽ được nhân viên khoa duyệt và gắn vào hồ sơ của bạn.</p>'
  ));

  const preview = document.getElementById("preview");
  const fileInput = document.getElementById("fileInput");
  const nameInput = document.getElementById("nameInput");
  const submitBtn = document.getElementById("submitBtn");
  let dataUrl = null;

  preview.addEventListener("click", function(){ fileInput.click(); });
  fileInput.addEventListener("change", async function(){
    const file = fileInput.files[0];
    if(!file) return;
    preview.innerHTML = "Đang xử lý ảnh...";
    try{
      dataUrl = await resizeImageFile(file);
      preview.style.padding = "0";
      preview.innerHTML = '<img src="' + dataUrl + '" style="width:100%;height:100%;object-fit:cover;"/>';
    }catch(err){
      preview.innerHTML = "Không đọc được ảnh, thử lại";
      dataUrl = null;
    }
  });

  submitBtn.addEventListener("click", async function(){
    const name = nameInput.value.trim();
    if(!name){ renderForm("Vui lòng nhập họ và tên."); return; }
    if(!dataUrl){ renderForm("Vui lòng chọn ảnh chân dung."); return; }
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spin">⏳</span> Đang tải lên...';
    try{
      const r = await uploadPendingPhoto(name, dataUrl, "image/jpeg");
      if(r.error){ renderForm(r.error); return; }
      renderSuccess(name);
    }catch(err){
      renderForm("Lỗi kết nối, vui lòng thử lại.");
    }
  });
}

function renderSuccess(name){
  render(card(
    '<div style="text-align:center;">' +
      '<div style="width:56px;height:56px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;">✅</div>' +
      '<h2 style="margin:0 0 8px;font-size:16px;font-weight:800;color:#111827;">Tải ảnh thành công!</h2>' +
      '<p style="margin:0 0 20px;font-size:13px;color:#6b7280;">Cảm ơn <b>' + name + '</b>, ảnh của bạn đã được gửi đến khoa để duyệt và gắn vào hồ sơ thực hành.</p>' +
      '<button id="againBtn" style="padding:9px 20px;border:1px solid #d1d5db;border-radius:8px;background:white;font-size:13px;font-weight:700;cursor:pointer;color:#374151;">Tải ảnh khác</button>' +
    '</div>'
  ));
  document.getElementById("againBtn").addEventListener("click", function(){ renderForm(); });
}

renderForm();
</script>
</body>
</html>
